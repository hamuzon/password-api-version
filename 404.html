<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>404 - Not Found / 見つかりません</title>
  <link rel="icon" href="/icon.svg" type="image/svg+xml" />
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      padding: 0;
      font-family: 'Inter', 'Segoe UI', 'Hiragino Kaku Gothic ProN', sans-serif;
      background: linear-gradient(to bottom, #ffefba 0%, #ffffff 100%);
      color: #111;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 2rem;
    }
    .container {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      border-radius: 1.5rem;
      padding: 3rem 4rem;
      box-shadow: 0 8px 24px rgba(0,0,0,0.1);
      text-align: center;
      max-width: 600px;
      width: 100%;
    }
    h1 {
      font-weight: 800;
      font-size: 3rem;
      margin: 0 0 1.5rem 0;
      color: #333;
    }
    p {
      font-size: 1.1rem;
      margin: 0.5rem 0;
      color: #444;
      line-height: 1.6;
    }
    .subtext {
      font-size: 0.95rem;
      color: #666;
      margin-bottom: 2.5rem;
    }
    a.back {
      display: inline-block;
      width: 100%;
      background: #3399ff;
      padding: 1rem;
      font-size: 1.1rem;
      border-radius: 14px;
      font-weight: 700;
      color: #fff;
      text-decoration: none;
      box-shadow: 0 6px 15px rgba(51,153,255,0.7);
      transition: background-color 0.3s ease, transform 0.2s;
    }
    a.back:hover {
      background-color: #1673e6;
      transform: translateY(-2px);
    }
    @media (max-width: 600px) {
      .container {
        padding: 2rem;
      }
      h1 {
        font-size: 2.2rem;
      }
      p {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>404 - error</h1>
    <p>エラーが発生しました: 見つかりません / Not Found</p>
    <p class="subtext">Sorry, Not Found.</p>
    <a id="backLink" class="back" href="/">トップページへ戻る / Back to Home</a>
  </div>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      if (location.hostname === "hamuzon.github.io") {
        document.getElementById("backLink").href =
          "https://hamuzon.github.io/password-api-version/";
      }
    });
  </script>
</body>
</html>
</body>
</html>
